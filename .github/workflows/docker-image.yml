name: Docker Image CI

on:
  push:
    branches: [ "feature/*" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Environment
      run: ./setup_environment.sh


    - name: Build Docker image
      run: |
        python3 container_operations.py -o build --uid 1000 --gid 1000 --user developer
